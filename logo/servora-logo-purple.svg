    x="114" y="58"
    font-family="Inter, Arial, sans-serif"
    font-size="44"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#2D3436">Serv</text>

  <text
    x="218" y="58"
    font-family="Inter, Arial, sans-serif"
    font-size="44"
